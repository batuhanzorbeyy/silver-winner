<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>the lost knight</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#0c0a14;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;font-family:monospace}


.crt-kasa{

}


.ekran-cerceve{

.scanline-katman{

}
.vignette-katman{
  position:absolute;top:0;left:0;right:0;bottom:0;

.hud{
  width:100%;
  display:flex;justify-content:space-between;align-items:center;

.hud .can{color:#d03838;text-shadow:0 0 5px rgba(208,56,56,0.4)}

.hud .silah{color:#70b0e0;text-shadow:0 0 5px rgba(100,170,220,0.3)}

.crt-alt{

  color:rgba(255,255,255,0.12);

  background:rgba(12,10,20,0.85);
  border-top:1px solid rgba(255,255,255,0.04);
  flex-shrink:0;

.ses-btn{
  position:fixed;top:10px;right:12px;z-index:20;
  width:32px;height:32px;border-radius:8px;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.45);font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;

}
.ses-btn:hover{background:rgba(255,255,255,0.15)}


.fs-btn

  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.18);
  color:rgba(255,255,255,0.45);font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.fs-btn:hover{background:rgba(255,255,255,0.15)}


.mobil-kontrol{display:none;position:fixed;bottom:8px;left:0;right:0;padding:0 16px;z-index:20}

.mbtn{
  width:56px;height:56px;border-radius:12px;

  border:1px solid rgba(255,255,255,0.14);

.sol-grup,.sag-grup{display:flex;gap:6px}
@media(hover:none)and(pointer:coarse){.mobil-kontrol{display:block}}

<div class="fs-btn" id="fsBtn" title="Fullscreen">⛶</div>

</div></div>

<script>
var cnv=document.getElementById("oyun"),ctx=cnv.getContext("2d");
var GEN=640,YUK=400,KARE=16,OLCEK=2,BO=KARE*OLCEK;


function ekranBoyutAyarla() {
  var cerceve = document.querySelector(".ekran-cerceve");
  var ew = cerceve.clientWidth;
  var eh = cerceve.clientHeight;


  var oyunOran = GEN / YUK;
  var ekranOran = ew / eh;

  var cizW, cizH;
  if (ekranOran > oyunOran) {

    cizH = eh;
    cizW = eh * oyunOran;
  } else {

    cizW = ew;
    cizH = ew / oyunOran;
  }

  cnv.style.width = Math.floor(cizW) + "px";
  cnv.style.height = Math.floor(cizH) + "px";
}


ekranBoyutAyarla();
window.addEventListener("resize", ekranBoyutAyarla);


var fsBtn = document.getElementById("fsBtn");
fsBtn.addEventListener("click", function(e) {
  e.stopPropagation();
  var el = document.documentElement;
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    // tam ekrana gec
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    fsBtn.textContent = "⊠";
  } else {
    // tam ekrandan cik
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    fsBtn.textContent = "⛶";
  }
});


document.addEventListener("fullscreenchange", function() {
  setTimeout(ekranBoyutAyarla, 100);
  fsBtn.textContent = document.fullscreenElement ? "⊠" : "⛶";
});
document.addEventListener("webkitfullscreenchange", function() {
  setTimeout(ekranBoyutAyarla, 100);
  fsBtn.textContent = document.webkitFullscreenElement ? "⊠" : "⛶";
});


function sp(w,h,d){var c=document.createElement("canvas");c.width=w;c.height=h;var x=c.getContext("2d");for(var i=0;i<d.length;i++){x.fillStyle=d[i][2];x.fillRect(d[i][0],d[i][1],1,1)}return c}




var TEN="#e8a870",TEN_G="#c88850",GOM="#2860c0",GOM_G="#1c4898",PAN="#1a3890",AYK="#381a08",KEM="#b89028",PEL="#a02828",PEL_G="#781818";

function sovalyeCiz(poz){
  var p=[];
  // kask
  [[6,0],[7,0],[8,0],[9,0],[10,0],[11,0]].forEach(function(c){p.push([c[0],c[1],"#808898"])});
  [[5,1],[6,1],[7,1],[8,1],[9,1],[10,1],[11,1],[12,1],[5,2],[12,2]].forEach(function(c){p.push([c[0],c[1],"#808898"])});
  p.push([7,0,"#a0a8b8"],[8,0,"#b0b8c8"]);
  // yuz
  [[6,2],[7,2],[8,2],[9,2],[10,2],[11,2],[5,3],[6,3],[7,3],[8,3],[9,3],[10,3],[11,3],[12,3],[5,4],[6,4],[7,4],[8,4],[9,4],[10,4],[11,4],[12,4],[6,5],[7,5],[8,5],[9,5],[10,5],[11,5]].forEach(function(c){p.push([c[0],c[1],TEN])});
  p.push([7,3,"#fff"],[8,3,"#fff"],[10,3,"#fff"],[11,3,"#fff"],[8,3,"#181818"],[10,3,"#181818"],[8,5,"#b06040"],[9,5,"#b06040"]);
  // govde
  [[6,6],[7,6],[8,6],[9,6],[10,6],[11,6],[5,7],[6,7],[7,7],[8,7],[9,7],[10,7],[11,7],[12,7],[5,8],[6,8],[7,8],[8,8],[9,8],[10,8],[11,8],[12,8],[5,9],[6,9],[7,9],[8,9],[9,9],[10,9],[11,9],[12,9],[6,10],[7,10],[8,10],[9,10],[10,10],[11,10]].forEach(function(c){p.push([c[0],c[1],GOM])});
  p.push([5,7,GOM_G],[5,8,GOM_G],[5,9,GOM_G]);
  for(var y=7;y<=9;y++)p.push([9,y,"#3878e0"]);
  for(var x=6;x<=11;x++)p.push([x,10,KEM]);
  p.push([8,10,"#d8b838"],[9,10,"#d8b838"]);
  // pelerin
  if(poz==1){p.push([13,6,PEL],[14,6,PEL],[15,7,PEL_G],[13,7,PEL],[14,7,PEL],[13,8,PEL],[14,8,PEL_G])}
  else{p.push([13,7,PEL],[13,8,PEL],[13,9,PEL],[13,10,PEL],[14,8,PEL_G],[14,9,PEL_G])}
  // kollar
  if(poz==2||poz==3){[[4,5],[4,6],[3,4],[3,5],[13,5],[13,6],[14,4],[14,5]].forEach(function(c){p.push([c[0],c[1],TEN])})}
  else{[[4,7],[4,8],[4,9],[3,9],[3,10]].forEach(function(c){p.push([c[0],c[1],TEN])});p.push([13,7,TEN],[13,8,TEN])}
  // pantolon+bot
  [[6,11],[7,11],[8,11],[9,11],[10,11],[5,12],[6,12],[7,12],[9,12],[10,12],[11,12],[5,13],[6,13],[10,13],[11,13]].forEach(function(c){p.push([c[0],c[1],PAN])});
  [[4,14],[5,14],[6,14],[7,14],[9,14],[10,14],[11,14],[12,14],[4,15],[5,15],[6,15],[10,15],[11,15],[12,15]].forEach(function(c){p.push([c[0],c[1],AYK])});
  if(poz==1){p.push([4,13,PAN],[3,14,AYK],[3,15,AYK],[12,12,PAN],[13,13,AYK])}
  return sp(20,20,p);
}
var sovalyeK=[sovalyeCiz(0),sovalyeCiz(1),sovalyeCiz(2),sovalyeCiz(3)];

// kilic sprite
var kilicSp=sp(12,5,[[0,1,"#604020"],[0,2,"#604020"],[0,3,"#604020"],[1,1,"#705030"],[1,2,"#705030"],[1,3,"#705030"],[2,0,"#888"],[2,1,"#888"],[2,2,"#aaa"],[2,3,"#888"],[2,4,"#888"],[3,2,"#bbc"],[4,2,"#ccd"],[5,2,"#dde"],[6,2,"#eef"],[7,2,"#fff"],[8,2,"#fff"],[9,2,"#eef"],[10,2,"#dde"],[11,2,"#fff"],[3,1,"#99a"],[4,1,"#aab"],[5,1,"#bbc"],[6,1,"#ccd"],[7,1,"#dde"],[8,1,"#eef"],[3,3,"#99a"],[4,3,"#aab"],[5,3,"#bbc"],[6,3,"#ccd"],[7,3,"#dde"],[8,3,"#eef"]]);

// ok sprite
var okSp=sp(10,3,[[0,1,"#705030"],[1,1,"#806040"],[2,1,"#806040"],[3,1,"#806040"],[4,1,"#806040"],[5,1,"#806040"],[6,1,"#806040"],[7,1,"#aaa"],[8,1,"#ccc"],[9,0,"#ddd"],[9,1,"#eee"],[9,2,"#ddd"],[0,0,"#a03030"],[0,2,"#a03030"]]);

// altin
function altinCiz(f){var ws=[8,6,4,6],w=ws[f],p=[],b=Math.floor((8-w)/2);for(var y=0;y<8;y++)for(var x=0;x<w;x++){var k=(y==0||y==7||x==0||x==w-1);p.push([x+b,y,k?"#b08018":"#e8b830"])}if(w>5){p.push([b+Math.floor(w/2),2,"#907010"]);p.push([b+Math.floor(w/2),5,"#907010"])}return sp(8,8,p)}
var altinK=[altinCiz(0),altinCiz(1),altinCiz(2),altinCiz(3)];

// balcik
function balcikCiz(ez){var p=[],boy=ez?7:9,ky=ez?2:0;for(var y=0;y<boy;y++){var s=y+ky,w;if(y<2)w=6+y*2;else if(y<boy-2)w=10;else w=10-(y-(boy-3));var b=Math.floor((10-w)/2);for(var x=0;x<w;x++){var kn=(y==0||x==0||x==w-1);p.push([x+b,s,kn?"#287828":(y<2?"#50c850":"#38a838")])}}var gy=ky+(ez?2:3);p.push([3,gy,"#fff"],[4,gy,"#fff"],[6,gy,"#fff"],[7,gy,"#fff"],[3,gy,"#181818"],[6,gy,"#181818"]);return sp(10,10,p)}
var balcikK=[balcikCiz(false),balcikCiz(true)];

// yarasa
function yarasaCiz(up){var p=[],g="#483870",k="#6850a0";[[4,2],[5,2],[6,2],[4,3],[5,3],[6,3],[5,4]].forEach(function(c){p.push([c[0],c[1],g])});p.push([4,2,"#e02828"],[6,2,"#e02828"]);(up?[[2,0],[3,0],[7,0],[8,0],[1,1],[2,1],[3,1],[7,1],[8,1],[9,1]]:[[1,3],[2,3],[3,3],[7,3],[8,3],[9,3],[0,4],[1,4],[9,4],[10,4]]).forEach(function(c){p.push([c[0],c[1],k])});return sp(11,6,p)}
var yarasaK=[yarasaCiz(true),yarasaCiz(false)];

// diken
var dikenSp=(function(){var p=[];for(var n=0;n<4;n++){var bx=n*4;for(var y=0;y<8;y++){var w=4-y;if(w<1)w=1;var ox=Math.floor((4-w)/2);for(var x=0;x<w;x++)p.push([bx+ox+x,15-y,y<2?"#707070":y<5?"#909090":"#c0c0c0"])}}return sp(16,16,p)})();

// kalp
var kalpSp=(function(){var p=[];[[1,0],[2,0],[4,0],[5,0],[0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],[0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[1,3],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4],[3,5]].forEach(function(c){p.push([c[0],c[1],"#d03848"])});p.push([1,0,"#e86878"],[2,0,"#e86878"],[0,1,"#e86878"]);return sp(8,7,p)})();

// silah pickup sprite'lari
var kilicPickupSp=sp(10,10,(function(){var p=[];for(var y=3;y<=7;y++)p.push([5,y,"#dde"]);p.push([4,3,"#aab"],[6,3,"#aab"],[3,4,"#888"],[7,4,"#888"]);p.push([5,8,"#604020"],[5,9,"#604020"],[4,9,"#705030"],[6,9,"#705030"]);return p})());
var okPickupSp=sp(10,10,(function(){var p=[];for(var x=1;x<=8;x++)p.push([x,5,"#806040"]);p.push([9,4,"#ccc"],[9,5,"#eee"],[9,6,"#ccc"]);p.push([0,4,"#a03030"],[0,5,"#a03030"],[0,6,"#a03030"]);p.push([1,4,"#806040"],[1,6,"#806040"]);return p})());

// bayrak
function bayrakCiz(t){var p=[];for(var y=0;y<16;y++)p.push([2,y,"#b0b0b0"]);for(var y=0;y<6;y++)for(var x=0;x<8;x++){var d=Math.round(Math.sin((x+t*0.15)*0.8)*0.6);p.push([3+x,1+y+d,((x+y+Math.floor(t/8))%4<2)?"#d03030":"#e0b030"])}return sp(12,17,p)}

// ======== KARA SOVALYE (BOSS) ========
// buyuk sprite - 24x24
function bossCiz(poz,hasar){
  var p=[];
  var zrhR = hasar>60?"#600808":"#282828"; // hasar alinca zirh kizariyor
  var zrhH = hasar>60?"#801010":"#383838";
  var gozR = hasar>30?"#ff2020":"#e04040";
  // kask - korkutucu, boynuzlu
  [[8,0],[9,0],[10,0],[11,0],[12,0],[13,0],[14,0],[15,0]].forEach(function(c){p.push([c[0],c[1],zrhH])});
  [[7,1],[8,1],[9,1],[10,1],[11,1],[12,1],[13,1],[14,1],[15,1],[16,1]].forEach(function(c){p.push([c[0],c[1],zrhR])});
  // boynuzlar
  p.push([6,0,"#555"],[5,0,"#666"],[4,1,"#777"],[17,0,"#555"],[18,0,"#666"],[19,1,"#777"]);
  // yuz - karanlik
  [[7,2],[8,2],[9,2],[10,2],[11,2],[12,2],[13,2],[14,2],[15,2],[16,2]].forEach(function(c){p.push([c[0],c[1],"#1a1018"])});
  [[7,3],[8,3],[9,3],[10,3],[11,3],[12,3],[13,3],[14,3],[15,3],[16,3]].forEach(function(c){p.push([c[0],c[1],"#1a1018"])});
  // kirmizi gozler
  p.push([9,2,gozR],[10,2,gozR],[13,2,gozR],[14,2,gozR]);
  p.push([9,3,"#ff6060"],[14,3,"#ff6060"]); // goz parlamasi
  // govde - agir zirh
  for(var y=4;y<=10;y++)for(var x=6;x<=17;x++){
    var kenar=(x==6||x==17||y==4);
    p.push([x,y,kenar?zrhR:zrhH]);
  }
  // zirh detaylari
  for(var y=5;y<=9;y++)p.push([11,y,"#444"],[12,y,"#444"]);
  // omuz zirhi (buyuk)
  [[4,4],[5,4],[5,5],[4,5],[3,5],[18,4],[19,4],[18,5],[19,5],[20,5]].forEach(function(c){p.push([c[0],c[1],zrhR])});
  // kollar
  if(poz==1){// saldiri pozu
    [[3,6],[3,7],[2,7],[2,8],[1,8]].forEach(function(c){p.push([c[0],c[1],"#1a1018"])});
    [[20,6],[20,7],[21,7],[21,8],[22,8]].forEach(function(c){p.push([c[0],c[1],"#1a1018"])});
  } else {
    [[4,6],[4,7],[4,8],[3,8],[3,9]].forEach(function(c){p.push([c[0],c[1],"#1a1018"])});
    [[19,6],[19,7],[19,8],[20,8],[20,9]].forEach(function(c){p.push([c[0],c[1],"#1a1018"])});
  }
  // kemer - kirmizi
  for(var x=6;x<=17;x++)p.push([x,11,"#801020"]);
  p.push([11,11,"#c0a030"],[12,11,"#c0a030"]); // toka
  // bacaklar
  for(var y=12;y<=15;y++){
    for(var x=7;x<=10;x++)p.push([x,y,zrhR]);
    for(var x=13;x<=16;x++)p.push([x,y,zrhR]);
  }
  // botlar
  for(var y=16;y<=17;y++){
    for(var x=6;x<=10;x++)p.push([x,y,"#1a1018"]);
    for(var x=13;x<=17;x++)p.push([x,y,"#1a1018"]);
  }
  // pelerin - koyu mor
  for(var y=5;y<=14;y++){p.push([5,y,"#301030"]);p.push([18,y,"#301030"])}
  for(var y=8;y<=16;y++){p.push([4,y,"#200820"]);p.push([19,y,"#200820"])}
  return sp(24,24,p);
}
var bossK=[bossCiz(0,0),bossCiz(1,0)];

var bossKilicSp=sp(16,5,(function(){var p=[];
  for(var x=0;x<16;x++){var c=x<3?"#401010":x<5?"#888":"#aaa";p.push([x,1,c],[x,2,c],[x,3,c])}

  p.push([0,0,"#301010"],[0,4,"#301010"],[1,0,"#401010"],[1,4,"#401010"]);

// ===================== KARO =====================
function karoYap(tip){var p=[],x,y;
if(tip==1){for(y=0;y<16;y++)for(x=0;x<16;x++){if(y<3){var g=90+(Math.random()*70)|0;p.push([x,y,"rgb("+(35+(Math.random()*20|0))+","+g+","+(18+(Math.random()*18|0))+")"])}else{var t=65+(Math.random()*45)|0;p.push([x,y,"rgb("+(t+18)+","+(t-8)+","+(t-28)+")"])}}}
else if(tip==2){for(y=0;y<16;y++)for(x=0;x<16;x++){var v=75+(Math.random()*35)|0;var k=(x==0||x==15||y==0||y==15);p.push([x,y,k?"rgb("+(v-18)+","+(v-18)+","+(v-12)+")":"rgb("+v+","+v+","+(v+4)+")"])}}

  for(var i=0;i<silahL.length;i++){var s=silahL[i];if(!s.aktif)continue;if(dikCarpis(o,{x:s.x+4,y:s.y+4,w:24,h:24})){s.aktif=false;mevcutSilah=s.tip;parcOlustur(s.x+12,s.y+12,"#70b0e0",10);sfxCal("altin")}}

  // dusmanlar
  for(var i=0;i<dusmanL.length;i++){var d=dusmanL[i];if(!d.aktif)continue;d.x+=d.yon;if(d.x>d.ox+d.m||d.x<d.ox-d.m)d.yon*=-1;var dK={x:d.x+4,y:d.y+4,w:24,h:28};if(kA&&dikCarpis(kA,dK)){d.aktif=false;parcOlustur(d.x+12,d.y+12,"#38a838",12);sarsinti=6;continue}if(o.vy>0&&dikCarpis(o,dK)&&o.y+o.h-8<d.y+8){d.aktif=false;o.vy=-7;parcOlustur(d.x+12,d.y+12,"#38a838",12);continue}if(dikCarpis(o,dK)&&o.dokunulmaz<=0)vur()}
  // yarasalar
  for(var i=0;i<yarasaL.length;i++){var yr=yarasaL[i];if(!yr.aktif)continue;yr.t+=0.04;yr.x=yr.ox+Math.sin(yr.t)*yr.m;yr.y=yr.oy+Math.cos(yr.t*1.3)*30;var yrK={x:yr.x+2,y:yr.y+2,w:28,h:16};if(kA&&dikCarpis(kA,yrK)){yr.aktif=false;parcOlustur(yr.x+14,yr.y+8,"#6850a0",10);sarsinti=6;continue}if(dikCarpis(o,yrK)&&o.dokunulmaz<=0)vur()}
  // dikenler
  for(var i=0;i<dikenL.length;i++){var dk=dikenL[i];if(dikCarpis(o,{x:dk.x+4,y:dk.y+8,w:24,h:20})&&o.dokunulmaz<=0){vur();if(durum=="oyna")o.vy=-6}}
  // lavlar
  for(var i=0;i<lavL.length;i++){var lv=lavL[i];if(dikCarpis(o,{x:lv.x+2,y:lv.y+8,w:BO-4,h:BO-8})&&o.dokunulmaz<=0){vur();if(durum=="oyna")o.vy=-8}}

  // ======== BOSS AI ========
  if(boss&&!boss.oldu){
    // oyuncu yaklasinca aktif ol
    if(!bossAktif&&o.x>boss.x-GEN*0.6)bossAktif=true;
    if(bossAktif){
      // yercekimi
      boss.vy+=0.5;if(boss.vy>10)boss.vy=10;
      boss.y+=boss.vy;
      // zemin kontrolu
      var bBot=boss.y+boss.h;
      var bTx1=Math.floor((boss.x+8)/BO),bTx2=Math.floor((boss.x+boss.w-8)/BO),bTy=Math.floor(bBot/BO);
      if((izgara[bTx1+","+bTy]||0)!=0||(izgara[bTx2+","+bTy]||0)!=0){
        boss.y=bTy*BO-boss.h;boss.vy=0;boss.yerde=true;
      }else boss.yerde=false;

      // oyuncuya bak
      boss.bakan=o.x<boss.x?-1:1;

      // saldiri zamanlayici
      boss.saldiriSayac++;
      var mesafe=Math.abs(o.x-boss.x);

      if(boss.durum=="bekle"){
        // yurume - oyuncuya dogru
        if(mesafe>80){boss.x+=boss.bakan*1.2}
        // saldiri secimi
        if(boss.saldiriSayac>90){
          boss.saldiriSayac=0;
          var r=Math.random();
          if(mesafe<100){boss.durum="kilic";boss.saldiTip=0}
          else if(r<0.4){boss.durum="dash";boss.dashHiz=boss.bakan*6}
          else{boss.durum="ates";boss.saldiTip=0}
        }
      }
      else if(boss.durum=="kilic"){
        boss.saldiTip++;
        if(boss.saldiTip>20){boss.durum="bekle";boss.saldiriSayac=30}
        // kilic vurusu - oyuncuya hasar
        if(boss.saldiTip==10){
          var bKilic={x:boss.bakan>0?boss.x+boss.w:boss.x-40,y:boss.y+10,w:40,h:30};
          if(dikCarpis(o,bKilic)&&o.dokunulmaz<=0){vur();o.vx=boss.bakan*5;o.vy=-4}
          sarsinti=4;sfxCal("kilic");
        }
      }
      else if(boss.durum=="dash"){
        boss.x+=boss.dashHiz;
        boss.saldiTip++;
        // duvara carparsa veya yeterince gittiyse dur
        if(boss.saldiTip>30||saglam(boss.x+(boss.dashHiz>0?boss.w:0),boss.y+boss.h/2)){
          boss.durum="bekle";boss.saldiriSayac=40;boss.saldiTip=0;
          sarsinti=6;
        }
        // dash sirasinda carpisma
        if(dikCarpis(o,{x:boss.x,y:boss.y,w:boss.w,h:boss.h})&&o.dokunulmaz<=0){vur();o.vx=boss.bakan*6;o.vy=-5}
      }
      else if(boss.durum=="ates"){
        boss.saldiTip++;
        if(boss.saldiTip==15){
          // ates topu firlat
          boss.atesToplar.push({x:boss.x+boss.w/2,y:boss.y+20,vx:boss.bakan*4,vy:-2,omur:120});
          sfxCal("vurus");
        }
        if(boss.saldiTip==35&&boss.can<50){
          // dusuk canda ikinci ates topu
          boss.atesToplar.push({x:boss.x+boss.w/2,y:boss.y+20,vx:boss.bakan*3.5,vy:-3,omur:120});
        }
        if(boss.saldiTip>45){boss.durum="bekle";boss.saldiriSayac=20;boss.saldiTip=0}
      }

      // ates toplari guncelle
      for(var i=boss.atesToplar.length-1;i>=0;i--){
        var at=boss.atesToplar[i];at.x+=at.vx;at.vy+=0.08;at.y+=at.vy;at.omur--;
        if(at.omur<=0||at.y>YUK){boss.atesToplar.splice(i,1);continue}
        if(dikCarpis(o,{x:at.x-8,y:at.y-8,w:16,h:16})&&o.dokunulmaz<=0){
          vur();boss.atesToplar.splice(i,1);o.vy=-4;
        }
      }

      // oyuncunun kilici bossa degdi mi
      if(kA&&dikCarpis(kA,{x:boss.x,y:boss.y,w:boss.w,h:boss.h})){
        boss.can-=5;boss.hasar+=5;sarsinti=6;parcOlustur(boss.x+boss.w/2,boss.y+boss.h/2,"#ff4040",10);sfxCal("vurus");
        if(boss.can<=0){boss.oldu=true;boss.olumZaman=120;sfxCal("olum")}
      }
      // stomping
      if(o.vy>0&&dikCarpis(o,{x:boss.x,y:boss.y,w:boss.w,h:boss.h})&&o.y+o.h-10<boss.y+10){
        boss.can-=10;boss.hasar+=10;o.vy=-8;sarsinti=5;parcOlustur(boss.x+boss.w/2,boss.y,"#ff4040",10);
        if(boss.can<=0){boss.oldu=true;boss.olumZaman=120;sfxCal("olum")}
      }
      // arena siniri
      if(boss.x<66*BO)boss.x=66*BO;
      if(boss.x>77*BO)boss.x=77*BO;
    }
  }
  // boss olum animasyonu
  if(boss&&boss.oldu){
    boss.olumZaman--;
    if(boss.olumZaman>0){
      // patlama parcaciklari
      if(sayac%4==0)parcOlustur(boss.x+Math.random()*boss.w,boss.y+Math.random()*boss.h,"#ff"+["4040","6060","8020","a000"][Math.random()*4|0],5);
      sarsinti=3;
    }
  }

  // bayrak
  var bayrakEngel = boss && !boss.oldu;
  if(!bayrakEngel && dikCarpis(o,{x:bayrakP.x,y:bayrakP.y-20,w:32,h:52})){
    if(mB<bolumler.length-1){durum="gecti";parcOlustur(bayrakP.x+16,bayrakP.y,"#e8b830",30);sfxCal("gecis")}
    else{durum="bitti";parcOlustur(bayrakP.x+16,bayrakP.y,"#e8b830",50);sfxCal("gecis")}
  }
  arayuzGunc();
}

function vur(){if(o.dokunulmaz>0)return;can--;sarsinti=10;parcOlustur(o.x+16,o.y+18,"#d03848",15);if(can<=0){durum="oldu";sfxCal("olum")}else{o.dokunulmaz=90;sfxCal("vurus")}arayuzGunc()}
function arayuzGunc(){
  var s="";for(var i=0;i<Math.max(0,can);i++)s+="♥";
  document.getElementById("canUI").textContent=s;
  document.getElementById("altinUI").textContent=tAltin+" gold";
  document.getElementById("silahUI").textContent=(mevcutSilah=="kilic"?"⚔ sword":"🏹 bow")+" [Q]";
  document.getElementById("bolumUI").textContent="stage "+(mB+1);
}

// ===================== CIZIM =====================
function ciz(){
  var bl=bolumler[mB];
  var sx=sarsinti>0?(Math.random()-0.5)*sarsinti:0,sy=sarsinti>0?(Math.random()-0.5)*sarsinti:0;
  ctx.save();ctx.translate(sx,sy);

  // gokyuzu - hava durumuna gore
  var grad=ctx.createLinearGradient(0,0,0,YUK);
  if(havaDurumu==1){grad.addColorStop(0,"#3080d0");grad.addColorStop(0.5,"#60a8e8");grad.addColorStop(1,"#90d0f0")}
  else if(havaDurumu==2){grad.addColorStop(0,"#405060");grad.addColorStop(0.5,"#607080");grad.addColorStop(1,"#809098")}
  else if(havaDurumu==3){grad.addColorStop(0,"#181020");grad.addColorStop(0.3,"#282030");grad.addColorStop(0.6,"#383040");grad.addColorStop(1,"#484050")}
  else{grad.addColorStop(0,"#1a1040");grad.addColorStop(0.3,"#2a2058");grad.addColorStop(0.6,"#483878");grad.addColorStop(1,"#7090c0")}
  ctx.fillStyle=grad;ctx.fillRect(0,0,GEN,YUK);

  // simsek flash
  if(simsekZaman>5){ctx.fillStyle="rgba(255,255,240,0.3)";ctx.fillRect(0,0,GEN,YUK)}

  // gunes (bolum 2 basi)
  if(havaDurumu==1){
    ctx.fillStyle="rgba(255,240,100,0.15)";ctx.beginPath();ctx.arc(500-kamX*0.03,60,50,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="rgba(255,220,80,0.3)";ctx.beginPath();ctx.arc(500-kamX*0.03,60,30,0,Math.PI*2);ctx.fill();
  }

  // yildizlar
  if(havaDurumu!=1){
    for(var i=0;i<50;i++){var px=((i*97+33)%800-kamX*0.1)%(GEN+100),py=(i*53+17)%(YUK*0.6);var prk=0.12+(i%3)*0.1;if(i%7==0)prk*=(Math.sin(sayac*0.1+i)*0.5+0.5);ctx.fillStyle="rgba(255,255,255,"+prk+")";if(px<0)px+=GEN+100;ctx.fillRect(px,py,2,2)}
  }

  // daglar
  ctx.fillStyle=havaDurumu==1?"rgba(100,160,80,0.2)":havaDurumu>=2?"rgba(40,40,50,0.3)":"rgba(72,56,120,0.2)";
  for(var i=0;i<8;i++){var mx=i*160-(kamX*0.15)%160;ctx.beginPath();ctx.moveTo(mx,YUK*0.7);ctx.lineTo(mx+80,YUK*0.3+Math.sin(i)*40);ctx.lineTo(mx+160,YUK*0.7);ctx.fill()}

  ctx.save();ctx.translate(-kamX,0);

  // karolar
  var basSut=Math.floor(kamX/BO)-1,bitSut=basSut+Math.ceil(GEN/BO)+3;
  for(var key in izgara){var p=key.split(","),tx=parseInt(p[0]),ty=parseInt(p[1]);if(tx<basSut||tx>bitSut)continue;ctx.drawImage(karoG(izgara[key]),tx*BO,ty*BO,BO,BO)}

  // hareketli platformlar
  for(var i=0;i<hareketliPL.length;i++){
    var hp=hareketliPL[i];
    // platform gorunumu
    ctx.fillStyle="#5a7a50";ctx.fillRect(hp.x,hp.y,hp.w,hp.h);
    ctx.fillStyle="#6a9a60";ctx.fillRect(hp.x+2,hp.y+2,hp.w-4,4);
    ctx.fillStyle="#4a6a40";ctx.fillRect(hp.x,hp.y+hp.h-3,hp.w,3);
    // ok isareti
    if(hp.minY!=undefined){ctx.fillStyle="rgba(255,255,255,0.15)";ctx.fillRect(hp.x+hp.w/2-1,hp.y-4,2,4);ctx.fillRect(hp.x+hp.w/2-1,hp.y+hp.h,2,4)}
  }

  // lavlar - animasyonlu
  for(var i=0;i<lavL.length;i++){
    var lv=lavL[i];
    // lav tabani
    ctx.fillStyle="#d02000";ctx.fillRect(lv.x,lv.y+4,BO,BO-4);
    // lav yuzey dalgasi
    for(var lx=0;lx<BO;lx+=2){
      var ly=Math.sin(sayac*0.08+lx*0.3+lv.x*0.01)*3;
      ctx.fillStyle=sayac%8<4?"#ff6020":"#ff8040";
      ctx.fillRect(lv.x+lx,lv.y+2+ly,2,4);
    }
    // parlama
    ctx.fillStyle="rgba(255,100,0,0.08)";ctx.fillRect(lv.x-4,lv.y-20,BO+8,20);
    // parcacik
    if(Math.random()<0.05)parcalar.push({x:lv.x+Math.random()*BO,y:lv.y,vx:(Math.random()-0.5)*1,vy:-Math.random()*2-1,omur:15,renk:"#ff"+["4020","6030","8040"][Math.random()*3|0],boyut:2});
  }

  // dikenler
  for(var i=0;i<dikenL.length;i++){var dk=dikenL[i];ctx.drawImage(dikenSp,dk.x,dk.y,BO,BO)}
  // altinlar
  var af=Math.floor(sayac/10)%4;for(var i=0;i<altinL.length;i++){var a=altinL[i];if(!a.aktif)continue;var bob=Math.sin(sayac*0.08+a.x*0.01)*3;ctx.drawImage(altinK[af],a.x+4,a.y+4+bob,24,24)}
  // kalpler
  for(var i=0;i<kalpL.length;i++){var k=kalpL[i];if(!k.aktif)continue;var bob=Math.sin(sayac*0.06+k.x*0.02)*4;ctx.drawImage(kalpSp,k.x+6,k.y+6+bob,20,18)}
  // silah pickuplari
  for(var i=0;i<silahL.length;i++){var s=silahL[i];if(!s.aktif)continue;var bob=Math.sin(sayac*0.07+s.x*0.015)*4;
    ctx.drawImage(s.tip=="kilic"?kilicPickupSp:okPickupSp,s.x+6,s.y+4+bob,20,24);
    // parlama
    ctx.fillStyle="rgba(100,180,255,"+(0.1+Math.sin(sayac*0.1)*0.08)+")";ctx.fillRect(s.x+2,s.y+bob,28,28);
  }
  // balciklar
  for(var i=0;i<dusmanL.length;i++){var d=dusmanL[i];if(!d.aktif)continue;var kare=Math.floor(sayac/15)%2;ctx.save();if(d.yon<0){ctx.translate(d.x+32,0);ctx.scale(-1,1);ctx.drawImage(balcikK[kare],0,d.y,32,32)}else ctx.drawImage(balcikK[kare],d.x,d.y,32,32);ctx.restore()}
  // yarasalar
  for(var i=0;i<yarasaL.length;i++){var yr=yarasaL[i];if(!yr.aktif)continue;var kare=Math.floor(sayac/8)%2;ctx.drawImage(yarasaK[kare],yr.x,yr.y,32,18)}

  // ======== BOSS CIZIMI ========
  if(boss){
    if(!boss.oldu||(boss.oldu&&boss.olumZaman>0)){
      var bPoz=(boss.durum=="kilic"&&boss.saldiTip>5&&boss.saldiTip<18)?1:0;
      // dinamik sprite (hasar gosterir)
      var bSprite=bossCiz(bPoz,boss.hasar);
      ctx.save();
      var bx=boss.x,by=boss.y;
      if(boss.oldu){// olum titremesi
        bx+=Math.random()*6-3;by+=Math.random()*6-3;
        ctx.globalAlpha=boss.olumZaman/120;
      }
      if(boss.bakan<0){ctx.translate(bx+boss.w,0);ctx.scale(-1,1);ctx.drawImage(bSprite,0,by,boss.w,boss.h)}
      else ctx.drawImage(bSprite,bx,by,boss.w,boss.h);
      ctx.restore();
      ctx.globalAlpha=1;

      // boss kilici
      if(!boss.oldu&&boss.durum=="kilic"&&boss.saldiTip>5&&boss.saldiTip<18){
        var bkx=boss.bakan>0?boss.x+boss.w:boss.x-38;
        ctx.save();
        if(boss.bakan<0){ctx.translate(bkx+38,0);ctx.scale(-1,1);ctx.drawImage(bossKilicSp,0,boss.y+20,38,12)}
        else ctx.drawImage(bossKilicSp,bkx,boss.y+20,38,12);
        ctx.restore();
      }

      // boss ates toplari
      for(var i=0;i<boss.atesToplar.length;i++){
        var at=boss.atesToplar[i];
        ctx.fillStyle="#ff4020";ctx.beginPath();ctx.arc(at.x,at.y,8,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="#ff8040";ctx.beginPath();ctx.arc(at.x,at.y,5,0,Math.PI*2);ctx.fill();
        ctx.fillStyle="#ffcc60";ctx.beginPath();ctx.arc(at.x,at.y,2,0,Math.PI*2);ctx.fill();
        // ates parcaciklari
        parcalar.push({x:at.x+(Math.random()-0.5)*6,y:at.y+(Math.random()-0.5)*6,vx:(Math.random()-0.5)*2,vy:-Math.random()*1,omur:6,renk:"#ff6020",boyut:2});
      }

      // boss can barı
      if(bossAktif&&!boss.oldu){
        var barW=100,barH=6,barX=boss.x+boss.w/2-barW/2,barY=boss.y-14;
        ctx.fillStyle="rgba(0,0,0,0.5)";ctx.fillRect(barX-1,barY-1,barW+2,barH+2);
        ctx.fillStyle="#400";ctx.fillRect(barX,barY,barW,barH);
        var canOran=boss.can/boss.maxCan;
        ctx.fillStyle=canOran>0.5?"#d04040":canOran>0.25?"#d08020":"#ff2020";
        ctx.fillRect(barX,barY,barW*canOran,barH);
        // isim
        ctx.fillStyle="#fff";ctx.font="8px monospace";ctx.textAlign="center";
        ctx.fillText("DARK KNIGHT",boss.x+boss.w/2,barY-3);
        ctx.textAlign="left";
      }
    }
  }

  // bayrak
  ctx.drawImage(bayrakCiz(sayac),bayrakP.x,bayrakP.y-4,36,40);
  // boss varsa ve olmediyse bayrak soluk
  if(boss&&!boss.oldu){ctx.fillStyle="rgba(0,0,0,0.4)";ctx.fillRect(bayrakP.x-2,bayrakP.y-8,40,48)}

  // oklar
  for(var i=0;i<oklar.length;i++){var ok=oklar[i];ctx.save();ctx.translate(ok.x,ok.y);var aci=Math.atan2(ok.vy,ok.vx);ctx.rotate(aci);ctx.drawImage(okSp,-5,-1,10,3);ctx.restore()}

  // -- OYUNCU --
  if(durum=="oyna"||durum=="gecti"||durum=="bitti"){
    if(o.dokunulmaz>0&&sayac%4<2){}
    else{
      var poz;if(o.saldiriyor)poz=3;else if(!o.yerde)poz=2;else if(Math.abs(o.vx)>1)poz=(Math.floor(sayac/8)%2==0)?0:1;else poz=0;
      var cW=40,cH=40,skX=1,skY=1,sq=o.squash||0;
      if(sq>0){skX=1+sq*0.04;skY=1-sq*0.04}else if(o.vy<-3){var st=Math.min(Math.abs(o.vy)*0.015,0.12);skX=1-st;skY=1+st}else if(o.vy>4&&!o.yerde){var st=Math.min(o.vy*0.01,0.08);skX=1-st*0.5;skY=1+st}
      var mX=o.x+(o.w-cW*skX)/2+cW*skX/2,mY=o.y+o.h;
      ctx.save();ctx.translate(mX,mY);ctx.scale(o.bakan<0?-skX:skX,skY);ctx.translate(-cW/2,-cH);ctx.drawImage(sovalyeK[poz],0,0,cW,cH);ctx.restore();
      // silah
      if(o.saldiriyor){
        if(mevcutSilah=="kilic"){var kx=o.bakan>0?o.x+o.w-4:o.x-30;ctx.save();if(o.bakan<0){ctx.translate(kx+34,0);ctx.scale(-1,1);ctx.drawImage(kilicSp,0,o.y+10,34,12)}else ctx.drawImage(kilicSp,kx,o.y+10,34,12);ctx.restore()}
        else{// ok atisi efekti
          var kx=o.bakan>0?o.x+o.w-2:o.x-12;ctx.save();if(o.bakan<0){ctx.translate(kx+14,0);ctx.scale(-1,1);ctx.drawImage(okSp,0,o.y+12,14,4)}else ctx.drawImage(okSp,kx,o.y+12,14,4);ctx.restore()}
      }
    }
  }

  // parcaciklar
  for(var i=0;i<parcalar.length;i++){var pr=parcalar[i];ctx.globalAlpha=pr.omur/28;ctx.fillStyle=pr.renk;ctx.fillRect(pr.x,pr.y,pr.boyut,pr.boyut)}ctx.globalAlpha=1;

  ctx.restore(); // kamera

  // yagmur
  if(havaDurumu>=2){
    ctx.strokeStyle=havaDurumu==3?"rgba(180,190,220,0.3)":"rgba(150,160,180,0.2)";
    ctx.lineWidth=1;
    for(var i=0;i<yagmurDamlalari.length;i++){
      var d=yagmurDamlalari[i];
      ctx.beginPath();ctx.moveTo(d.x-kamX,d.y);ctx.lineTo(d.x-kamX-2,d.y+d.vy*2);ctx.stroke();
    }
  }

  // simsek cizgisi
  if(simsekZaman>3&&simsekZaman<7){
    ctx.strokeStyle="rgba(255,255,240,0.8)";ctx.lineWidth=2;
    ctx.beginPath();var lx=200+Math.random()*200;ctx.moveTo(lx,0);
    for(var i=0;i<6;i++){lx+=(Math.random()-0.5)*40;ctx.lineTo(lx,i*60+Math.random()*40)}
    ctx.stroke();ctx.lineWidth=1;

// -- Ses cikis yapisi --
// Her muzik "sahnesi" icin ayri gain zinciri
// masterGain -> muzikGain -> (katman gain'leri)
// crossfade: eski sahnenin gain'i azalirken yenininki artar

var masterGain = null;
var muzikSahneleri = []; // {gain, sonrakiZaman, muzikIdx, aktif}
var aktifSahneIdx = -1;

function audioBaslat(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();
  masterGain.gain.value=0.35;
  masterGain.connect(audioCtx.destination);
}

// temel ses cikis fonksiyonlari
function notaCal(f,b,s,t,v,hedef){
  if(f==0||!audioCtx)return;
  var os=audioCtx.createOscillator(),g=audioCtx.createGain();
  os.type=t;os.frequency.value=f;
  // ADSR - daha yumusak zarf
  g.gain.setValueAtTime(0,b);
  g.gain.linearRampToValueAtTime(v,b+0.025);
  g.gain.setValueAtTime(v*0.85,b+0.05);
  g.gain.linearRampToValueAtTime(v*0.4,b+s*0.6);
  g.gain.linearRampToValueAtTime(0,b+s-0.01);
  os.connect(g);g.connect(hedef||masterGain);
  os.start(b);os.stop(b+s);
}

function padCal(f,b,s,t,v,hedef){
  // pad: cok yavas attack/release, uzun ses
  if(f==0||!audioCtx)return;
  var os=audioCtx.createOscillator(),g=audioCtx.createGain();
  os.type=t;os.frequency.value=f;
  g.gain.setValueAtTime(0,b);
  g.gain.linearRampToValueAtTime(v,b+s*0.15); // yavas giris
  g.gain.setValueAtTime(v*0.9,b+s*0.5);
  g.gain.linearRampToValueAtTime(0,b+s-0.1); // yavas cikis
  os.connect(g);g.connect(hedef||masterGain);
  os.start(b);os.stop(b+s);
}

function vurusCal(b,t,v,hedef){
  if(!audioCtx)return;
  var bs=audioCtx.sampleRate*0.08,bf=audioCtx.createBuffer(1,bs,audioCtx.sampleRate),d=bf.getChannelData(0);
  for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bs,t=="kick"?3:8);
  var k=audioCtx.createBufferSource();k.buffer=bf;
  var g=audioCtx.createGain();g.gain.value=v||0.12;
  k.connect(g);g.connect(hedef||masterGain);k.start(b);
  if(t=="kick"){var os=audioCtx.createOscillator(),og=audioCtx.createGain();os.frequency.setValueAtTime(150,b);os.frequency.exponentialRampToValueAtTime(30,b+0.1);og.gain.setValueAtTime(v*0.8,b);og.gain.linearRampToValueAtTime(0,b+0.12);os.connect(og);og.connect(hedef||masterGain);os.start(b);os.stop(b+0.15)}
}

// -- Sahne olustur: bir muzik parcasinin tum katmanlarini planla --
function sahnePlanla(muzikIdx, varyant) {
  if(!muzikAcik||!audioCtx) return null;

  var mDef = bolumMuzikleri[muzikIdx];
  if(!mDef) return null;
  var kat = varyant || mDef.katmanlar;
  var beat = 60 / mDef.tempo;

  // bu sahne icin gain node
  var sahneGain = audioCtx.createGain();
  sahneGain.gain.value = 0; // crossfade icin 0'dan baslayacak
  sahneGain.connect(masterGain);

  var simdi = audioCtx.currentTime;
  var sahne = {gain: sahneGain, sonrakiZaman: simdi + 0.15, muzikIdx: muzikIdx, aktif: true};

  planlaKatmanlar(sahne, kat, beat);
  return sahne;
}

function planlaKatmanlar(sahne, kat, beat) {
  var t = sahne.sonrakiZaman;
  var hedef = sahne.gain;

  // melodi
  if(kat.melodi) {
    var tM = t;
    for(var i=0;i<kat.melodi.notalar.length;i++){
      var n=kat.melodi.notalar[i],f=nFrek(n[0]),s=n[1]*beat;
      notaCal(f,tM,s*0.9,kat.melodi.dalga,kat.melodi.ses,hedef);
      tM+=s;
    }
    sahne.parcaSuresi = tM - t;
  }

  // harmoni
  if(kat.harmoni) {
    var tH = t;
    for(var i=0;i<kat.harmoni.notalar.length;i++){
      var n=kat.harmoni.notalar[i],f=nFrek(n[0]),s=n[1]*beat;
      notaCal(f,tH,s*0.85,kat.harmoni.dalga,kat.harmoni.ses,hedef);
      tH+=s;
    }
  }

  // bas
  if(kat.bas) {
    var tB = t;
    for(var i=0;i<kat.bas.notalar.length;i++){
      var n=kat.bas.notalar[i],f=nFrek(n[0]),s=n[1]*beat;
      notaCal(f,tB,s*0.85,kat.bas.dalga,kat.bas.ses,hedef);
      tB+=s;
    }
  }

  // arpej (dongusel)
  if(kat.arpej && sahne.parcaSuresi) {
    var tA=t, aC=0;
    while(tA < t + sahne.parcaSuresi) {
      var aN=kat.arpej.notalar[aC%kat.arpej.notalar.length];
      var f=nFrek(aN);
      notaCal(f,tA,beat*0.45,kat.arpej.dalga,kat.arpej.ses,hedef);
      tA+=beat*0.5; aC++;
    }
  }

  // pad (uzun atmosferik sesler)
  if(kat.pad) {
    var tP = t;
    for(var i=0;i<kat.pad.notalar.length;i++){
      var n=kat.pad.notalar[i],f=nFrek(n[0]),s=n[1]*beat;
      padCal(f,tP,s,kat.pad.dalga,kat.pad.ses,hedef);
      tP+=s;
    }
  }

  // ritim
  if(kat.ritim && sahne.parcaSuresi) {
    var tR=t, vC=0;
    while(tR < t + sahne.parcaSuresi) {
      if(kat.ritim.kick && vC%kat.ritim.kickHer==0) vurusCal(tR,"kick",kat.ritim.kickSes,hedef);
      if(kat.ritim.hihat && vC%kat.ritim.hihatHer==1) vurusCal(tR,"hihat",kat.ritim.hihatSes,hedef);
      tR+=beat; vC++;
    }
  }

  sahne.sonrakiZaman = t + (sahne.parcaSuresi || 16*beat);
}

// -- Crossfade: eski sahneyi sondur, yeni sahneyi ac --
function crossfadeYap(yeniSahne) {
  if(!audioCtx) return;
  var simdi = audioCtx.currentTime;

  // eski sahneleri sonlandirmaya basla
  for(var i=0;i<muzikSahneleri.length;i++) {
    var eski = muzikSahneleri[i];
    if(eski.aktif) {
      eski.aktif = false;
      // yavasca kapat
      try {
        eski.gain.gain.cancelScheduledValues(simdi);
        eski.gain.gain.setValueAtTime(eski.gain.gain.value, simdi);
        eski.gain.gain.linearRampToValueAtTime(0, simdi + crossfadeSuresi);
      } catch(e){}
      // crossfade bittikten sonra disconnect et
      (function(g){setTimeout(function(){try{g.disconnect()}catch(e){}}, (crossfadeSuresi+1)*1000)})(eski.gain);
    }
  }

  // yeni sahneyi ac
  if(yeniSahne) {
    yeniSahne.aktif = true;
    try {
      yeniSahne.gain.gain.setValueAtTime(0, simdi);
      yeniSahne.gain.gain.linearRampToValueAtTime(1, simdi + crossfadeSuresi);
    } catch(e){}
    muzikSahneleri.push(yeniSahne);
  }

  // eski oluleri temizle
  muzikSahneleri = muzikSahneleri.filter(function(s){return s.aktif});
}

// -- Bolum muzigi baslat (crossfade ile) --
var mevcutMuzikTipi = ""; // "bolum0", "bolum1", "bolum1_firtina", "bolum2", "bolum2_boss", "menu", "gecis", "olum"

function muzikDegistir(yeniTip) {
  if(yeniTip == mevcutMuzikTipi) return; // zaten caliyorsa degistirme
  if(!muzikAcik || !audioCtx) return;
  mevcutMuzikTipi = yeniTip;

  var yeniSahne = null;
  if(yeniTip == "bolum0") yeniSahne = sahnePlanla(0);
  else if(yeniTip == "bolum1") yeniSahne = sahnePlanla(1);
  else if(yeniTip == "bolum1_firtina") yeniSahne = sahnePlanla(1, bolumMuzikleri[1].firtinaVaryanti);
  else if(yeniTip == "bolum2") yeniSahne = sahnePlanla(2);
  else if(yeniTip == "bolum2_boss") yeniSahne = sahnePlanla(2, bolumMuzikleri[2].bossVaryanti);
  else if(yeniTip == "menu") yeniSahne = sahnePlanla(3);
  else if(yeniTip == "gecis") yeniSahne = sahnePlanla(4);
  else if(yeniTip == "olum") yeniSahne = sahnePlanla(5);

  crossfadeYap(yeniSahne);
}

// -- Muzik dongusunu kontrol et --
function muzikGunc() {
  if(!muzikAcik || !audioCtx) return;

  // aktif sahnenin muzigi bitmek uzereyse yeniden planla (loop)
  for(var i=0;i<muzikSahneleri.length;i++) {
    var s = muzikSahneleri[i];
    if(!s.aktif) continue;
    if(audioCtx.currentTime > s.sonrakiZaman - 2) {
      // tekrar planla
      var mDef = bolumMuzikleri[s.muzikIdx];
      if(!mDef) continue;
      var beat = 60 / mDef.tempo;

      // hangi katman setini kullan
      var kat = mDef.katmanlar;
      if(mevcutMuzikTipi == "bolum1_firtina" && mDef.firtinaVaryanti) kat = mDef.firtinaVaryanti;
      if(mevcutMuzikTipi == "bolum2_boss" && mDef.bossVaryanti) kat = mDef.bossVaryanti;

      planlaKatmanlar(s, kat, beat);
    }
  }

  // -- DINAMIK MUZIK GECISLERI --
  // durum bazinda otomatik gecis
  if(durum == "menu") {
    muzikDegistir("menu");
  }
  else if(durum == "oldu") {
    muzikDegistir("olum");
  }
  else if(durum == "gecti" || durum == "bitti") {
    muzikDegistir("gecis");
  }
  else if(durum == "oyna") {
    if(mB == 0) {
      muzikDegistir("bolum0");
    }
    else if(mB == 1) {
      // bolum 2: hava durumuna gore muzik
      if(havaDurumu >= 3) muzikDegistir("bolum1_firtina");
      else muzikDegistir("bolum1");
    }
    else if(mB == 2) {
      // bolum 3: boss aktif mi
      if(bossAktif && boss && !boss.oldu) muzikDegistir("bolum2_boss");
      else muzikDegistir("bolum2");
    }
  }
}

function muzikSifirla() {
  mevcutMuzikTipi = ""; // zorla yeniden baslat
}

// ses butonu
document.getElementById("sesBtn").addEventListener("click",function(e){
  e.stopPropagation();
  if(!muzikAcik){
    audioBaslat();muzikAcik=true;
    this.style.color="rgba(100,200,100,0.7)";
    mevcutMuzikTipi=""; // reset
  } else {
    muzikAcik=false;
    this.style.color="rgba(255,255,255,0.25)";
    // tum sahneleri kapat
    for(var i=0;i<muzikSahneleri.length;i++){
      try{muzikSahneleri[i].gain.gain.linearRampToValueAtTime(0,audioCtx.currentTime+0.5)}catch(e){}
      muzikSahneleri[i].aktif=false;
    }
    mevcutMuzikTipi="";
  }
});

// SFX - degismedi
function sfxCal(t){
  if(!audioCtx)audioBaslat();
  var g=audioCtx.createGain();g.gain.value=0.25;g.connect(audioCtx.destination);
  var ct=audioCtx.currentTime;
  if(t=="zipla"){var os=audioCtx.createOscillator();os.type="square";os.frequency.setValueAtTime(250,ct);os.frequency.exponentialRampToValueAtTime(600,ct+0.12);var gn=audioCtx.createGain();gn.gain.setValueAtTime(0.12,ct);gn.gain.linearRampToValueAtTime(0,ct+0.15);os.connect(gn);gn.connect(g);os.start();os.stop(ct+0.15)}
  else if(t=="altin"){var os=audioCtx.createOscillator();os.type="square";os.frequency.setValueAtTime(880,ct);os.frequency.setValueAtTime(1100,ct+0.06);os.frequency.setValueAtTime(1320,ct+0.12);var gn=audioCtx.createGain();gn.gain.setValueAtTime(0.1,ct);gn.gain.linearRampToValueAtTime(0,ct+0.2);os.connect(gn);gn.connect(g);os.start();os.stop(ct+0.2)}
  else if(t=="vurus"){var os=audioCtx.createOscillator();os.type="sawtooth";os.frequency.setValueAtTime(200,ct);os.frequency.exponentialRampToValueAtTime(60,ct+0.2);var gn=audioCtx.createGain();gn.gain.setValueAtTime(0.18,ct);gn.gain.linearRampToValueAtTime(0,ct+0.25);os.connect(gn);gn.connect(g);os.start();os.stop(ct+0.25)}
  else if(t=="olum"){for(var i=0;i<4;i++){var os=audioCtx.createOscillator();os.type="square";os.frequency.value=300-i*60;var gn=audioCtx.createGain();gn.gain.setValueAtTime(0.12,ct+i*0.12);gn.gain.linearRampToValueAtTime(0,ct+i*0.12+0.1);os.connect(gn);gn.connect(g);os.start(ct+i*0.12);os.stop(ct+i*0.12+0.12)}}
  else if(t=="kilic"){var bs=audioCtx.sampleRate*0.06,bf=audioCtx.createBuffer(1,bs,audioCtx.sampleRate),d=bf.getChannelData(0);for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bs,2);var s=audioCtx.createBufferSource();s.buffer=bf;var gn=audioCtx.createGain();gn.gain.value=0.1;var f=audioCtx.createBiquadFilter();f.type="highpass";f.frequency.value=2000;s.connect(f);f.connect(gn);gn.connect(g);s.start()}
  else if(t=="gecis"){var ns=[523.25,659.25,783.99,1046.50];for(var i=0;i<ns.length;i++){var os=audioCtx.createOscillator();os.type="square";os.frequency.value=ns[i];var gn=audioCtx.createGain();gn.gain.setValueAtTime(0.1,ct+i*0.15);gn.gain.linearRampToValueAtTime(0,ct+i*0.15+0.3);os.connect(gn);gn.connect(g);os.start(ct+i*0.15);os.stop(ct+i*0.15+0.35)}}
}

function basla(){durum="oyna";bolumYukle();oSifirla();parcalar=[];arayuzGunc();muzikSifirla()}
function dongu(){guncelle();ciz();muzikGunc();requestAnimationFrame(dongu)}

  if(durum=="menu")basla();
  else if(durum=="oldu"||durum=="bitti"){mB=0;can=3;tAltin=0;mevcutSilah="kilic";basla()}
  else if(durum=="gecti"){mB++;basla()}
}
cnv.addEventListener("click",tiklamaIsle);
document.querySelector(".ekran-cerceve").addEventListener("click",tiklamaIsle);

bolumYukle();arayuzGunc();dongu();
